outlier_detection:
  # Segment pace check (min per mile, computed between consecutive check-in times)
  pace_floor_min_per_mile: 6.0     # faster than this per segment is physically implausible
  pace_ceiling_min_per_mile: 90.0  # slower than this suggests a day-offset error

  # Rank-based outlier detection
  rank_model_min_samples: 10       # minimum runners needed to fit a model for a station/year
  rank_outlier_std_threshold: 2.5  # flag if |residual| exceeds N * residual std dev

  # Race cutoff
  race_cutoff_hours: 36
