stoppage_model:
  # Feature columns built by _stoppage_features() in
  # pipelines/feature_engineering/nodes.py — order matters for the model.
  features:
    - as_num
    - as_dist_from_start
    - elapsed_hrs
    - overall_pace_min_per_mi
    - age
    - gender_code
    - is_finisher
    - overall_rank_pct

  model:
    max_iter: 300
    learning_rate: 0.05
    max_depth: 6
    random_state: 42

  validation:
    strategy: year_holdout   # "year_holdout" or "random"
    holdout_year: 2023
    test_size: 0.2           # only used when strategy == "random"
    random_state: 42

  prediction:
    min_stoppage_min: 0.0
    max_stoppage_min: 120.0
