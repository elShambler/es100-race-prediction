# Setup our input data sets
# All of these are split level data sourced from:
# Source: Eastern States 100 Data Analytics Group

# 2016-2017 data is taken from UltraLive
es_splits_historical_2016-17:
  type: polars.CSVDataset
  filepath: 'data/01_raw/es100_2016-2017.csv'
  load_args:
    separator: ","

# 2021-2023 is part of the data used from the ES100 data analytics group
# 2025 is sourced from Ben Mazure and the ESTEA
es_splits_2021_2025:
  type: polars.CSVDataset
  filepath: 'data/01_raw/ES100_2021-2025_splits.csv'
  load_args:
    separator: ","
    infer_schema_length: 0
    schema_overrides:
      year: ${polars:Int64}
      OriginalOrder: ${polars:Int64}
      MaxTime: ${polars:Float64}
      OverallRank: ${polars:Int64}

# Race metadata: start dates and times per year
es_race_meta:
  type: polars.CSVDataset
  filepath: data/01_raw/es100_race_meta.csv
  load_args:
    separator: ","

# Historical AS info is obtained by scraping the AS info from the ES100 website
es_asinfo_historical:
  type: polars.CSVDataset
  filepath: data/01_raw/es100_all_as_info.csv
  load_args:
    separator: ","

# Finish times are the official race results
# Majority of the times are from Falcon Race Timing
es_finish_historical:
  type: polars.CSVDataset
  filepath: data/01_raw/es100_finish_times.csv
  load_args:
    separator: ","

# 2016-2017 splits enriched to match the 2021-2025 schema
es_splits_2016_2017_processed:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_splits_2016_2017_processed.csv
  metadata:
    kedro-viz:
      layer: intermediate

# All years combined into a single long-format dataset
es_splits_all:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_splits_all.csv
  load_args:
    # Check-out data is sparse (absent for 2016-2017, partial elsewhere), so
    # schema inference over the leading rows would type these as String.
    schema_overrides:
      as_check_in__elapsed__min: ${polars:Float64}
      as_check_out__elapsed__min: ${polars:Float64}
  metadata:
    kedro-viz:
      layer: intermediate

# 2021-2025 splits reshaped to long format (one row per runner × aid station)
es_splits_2021_2025_long:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_splits_2021_2025_long.csv
  load_args:
    infer_schema_length: 0
  metadata:
    kedro-viz:
      layer: intermediate

# Pace chart: distance vs elapsed time per runner, year toggle built into the figure
es_pace_chart:
  type: plotly.JSONDataset
  filepath: data/08_reporting/es_pace_chart.json
  metadata:
    kedro-viz:
      layer: reporting

# 2021-2025 splits enriched with elapsed times, AS distances, finish data, and rankings
es_splits_2021_2025_processed:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_splits_2021_2025_processed.csv
  load_args:
    # Early rows have no check-out times, which would infer as String.
    schema_overrides:
      as_check_in__elapsed__min: ${polars:Float64}
      as_check_out__elapsed__min: ${polars:Float64}
  metadata:
    kedro-viz:
      layer: intermediate

# Trained aid-station stoppage-time regressor (predicts minutes spent in an AS).
# MlflowArtifactDataset keeps the local pickle (downstream nodes load it even
# outside a tracked run) and logs a copy as an artifact of the MLflow run.
es_stoppage_model:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: pickle.PickleDataset
    filepath: data/06_models/es_stoppage_model.pkl
  metadata:
    kedro-viz:
      layer: models

# Holdout-validation metrics for the stoppage model (MAE vs naive baseline),
# kept locally and attached to the MLflow run as a JSON artifact.
es_stoppage_model_metrics:
  type: kedro_mlflow.io.artifacts.MlflowArtifactDataset
  dataset:
    type: json.JSONDataset
    filepath: data/06_models/es_stoppage_model_metrics.json
  metadata:
    kedro-viz:
      layer: models

# Numeric validation metrics logged to the MLflow run's metrics panel
es_stoppage_model_metrics_tracked:
  type: kedro_mlflow.io.metrics.MlflowMetricsHistoryDataset
  prefix: stoppage
  metadata:
    kedro-viz:
      layer: models

# All-years splits with missing check-in/check-out elapsed times imputed
# (2016-2017 has no recorded check-outs at all, so every departure there is
# predicted by the stoppage model).
es_splits_imputed:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/04_feature/es_splits_imputed.csv
  load_args:
    schema_overrides:
      as_check_in__elapsed__min: ${polars:Float64}
      as_check_out__elapsed__min: ${polars:Float64}
  metadata:
    kedro-viz:
      layer: feature

# Aid-station dashboard: self-contained HTML page for the race website
es_as_dashboard:
  type: text.TextDataset
  filepath: data/08_reporting/es_as_dashboard.html
  metadata:
    kedro-viz:
      layer: reporting

# Per runner × aid-station interval features: interval pace, overall pace, pace ratio
es_interval_features:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/04_feature/es_interval_features.csv
  metadata:
    kedro-viz:
      layer: feature

# 2026 course GPX (Footpath Route Planner export): one route + AS waypoints
es_course_gpx:
  type: text.TextDataset
  filepath: 'data/01_raw/Eastern States 100 - Full Course.gpx'

# Full-resolution 2026 route: lat/lon/elevation with cumulative miles
es_course_route:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_course_route.csv
  metadata:
    kedro-viz:
      layer: intermediate

# 2026 aid-station waypoints snapped to the route (GPX miles + official-scale miles)
es_course_stations:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_course_stations.csv
  metadata:
    kedro-viz:
      layer: intermediate

# Historical (year, as_index) → 2026 station crosswalk, matched on distance
es_station_xwalk:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/02_intermediate/es_station_xwalk.csv
  metadata:
    kedro-viz:
      layer: intermediate

# Interval (leg) pace ÷ final overall pace per finisher × aid station, all years
es_interval_ratio:
  type: eastern_states_pace_predict.datasets.polars_preview_csv_dataset.PolarsPreviewCSVDataset
  filepath: data/04_feature/es_interval_ratio.csv
  metadata:
    kedro-viz:
      layer: feature

# Blog-ready static figures rendered with the ES matplotlib theme.
# MatplotlibWriter saves through a buffer, so savefig cannot infer the format
# from the filename — each format needs its own entry with an explicit format.
es_blog_figures:
  type: matplotlib.MatplotlibWriter
  filepath: data/08_reporting/blog_figures
  save_args:
    dpi: 200
    bbox_inches: tight
    format: png
  metadata:
    kedro-viz:
      layer: reporting

es_blog_figures_svg:
  type: matplotlib.MatplotlibWriter
  filepath: data/08_reporting/blog_figures
  save_args:
    bbox_inches: tight
    format: svg
  metadata:
    kedro-viz:
      layer: reporting
